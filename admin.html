<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — КнигоМир</title>
    <link rel="stylesheet" href="/style.css?v=11">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container header-top">
            <a href="/" class="logo">
                <span class="logo-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                </span>
                <span>КнигоМир <small style="font-size: 0.5em; background: var(--error); color: white; padding: 2px 6px; border-radius: 4px; vertical-align: middle;">ADM</small></span>
            </a>
            <div class="header-actions" style="display: flex; align-items: center; gap: 1rem;">
                <button class="header-action-btn" id="themeToggle" title="Сменить тему">
                    <svg class="theme-icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg class="theme-icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
                <div id="userHeaderActions" style="display: flex; gap: 0.5rem; align-items: center;"></div>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: calc(var(--header-height) + 2rem); margin-bottom: 4rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Управление магазином</h1>
            <button class="btn-primary" onclick="showAddBookModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right: 0.5rem;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Добавить книгу
            </button>
        </div>

        <div class="admin-tabs" style="display: flex; gap: 1rem; border-bottom: 2px solid var(--border); margin-bottom: 2rem;">
            <button class="tab-btn active" onclick="switchAdminTab('books', this)">📚 Книги</button>
            <button class="tab-btn" onclick="switchAdminTab('orders', this)">📦 Заказы</button>
            <button class="tab-btn" onclick="switchAdminTab('reviews', this)">💬 Отзывы</button>
        </div>

        <div id="adminContent" class="admin-table-container">
            <div style="display: flex; justify-content: center; padding: 5rem;"><div class="loader"></div></div>
        </div>
    </main>

    <div id="bookModal" class="modal-overlay">
        <div class="modal" style="max-width: 800px; padding: 0; display: flex; flex-direction: column; max-height: 90vh;">
            <div style="padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-card);">
                <h2 id="modalTitle" style="margin: 0; font-weight: 800;">Добавить новую книгу</h2>
                <button class="modal-close" onclick="closeBookModal()" style="position: static; transform: none; padding: 0.5rem; line-height: 1;">&times;</button>
            </div>
            
            <div style="padding: 2rem; overflow-y: auto; flex: 1;">
                <form id="bookForm" class="admin-modal-form">
                    <input type="hidden" name="id" id="bookIdField">
                    
                    <div class="form-row full">
                        <label>Название книги</label>
                        <input type="text" name="title" class="form-control" required placeholder="Введите полное название">
                    </div>
                    
                    <div class="form-row">
                        <label>Автор</label>
                        <input type="text" name="author" class="form-control" required placeholder="Имя Фамилия">
                    </div>
                    
                    <div class="form-row">
                        <label>Категория (ID)</label>
                        <input type="number" name="categoryId" class="form-control" required placeholder="1">
                    </div>
                    
                    <div class="form-row">
                        <label>Цена (₽)</label>
                        <input type="number" name="price" class="form-control" required placeholder="0">
                    </div>
                    
                    <div class="form-row">
                        <label>Старая цена (₽)</label>
                        <input type="number" name="oldPrice" class="form-control" placeholder="Для скидки">
                    </div>
                    
                    <div class="form-row">
                        <label>Метка (Badge)</label>
                        <select name="badge" class="form-control">
                            <option value="">Без метки</option>
                            <option value="new">Новинка</option>
                            <option value="sale">Скидка</option>
                            <option value="bestseller">Хит</option>
                        </select>
                    </div>
                    
                    <div class="form-row">
                        <label>Год издания</label>
                        <input type="number" name="year" class="form-control" placeholder="2024">
                    </div>
                    
                    <div class="form-row full">
                        <label>URL обложки</label>
                        <input type="text" name="coverUrl" class="form-control" placeholder="https://example.com/cover.jpg">
                    </div>
                    
                    <div class="form-row full">
                        <label>Описание</label>
                        <textarea name="description" rows="5" class="form-control" style="resize: vertical;" placeholder="Краткое описание книги..."></textarea>
                    </div>
                </form>
            </div>

            <div style="padding: 1.5rem 2rem; border-top: 1px solid var(--border); background: var(--bg-main); display: flex; gap: 1rem;">
                <button type="button" class="btn-primary btn-outline" onclick="closeBookModal()" style="flex: 1; background: transparent; color: var(--text-main); height: 44px; border: 2px solid var(--border);">
                    Отмена
                </button>
                <button type="submit" form="bookForm" class="btn-save-book" style="flex: 1; height: 44px; border: 2px solid transparent;">
                    Сохранить книгу
                </button>
            </div>
        </div>
    </div>

    <div class="notifications" id="notifications"></div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/app.js?v=11"></script>
    <script>
        let currentTab = 'books';
        function switchAdminTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.admin-tabs .tab-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            loadAdminTab(tab);
        }
        function showAddBookModal() {
            document.getElementById('modalTitle').textContent = 'Добавить книгу';
            document.getElementById('bookForm').reset();
            document.getElementById('bookIdField').value = '';
            document.getElementById('bookModal').classList.add('active');
        }
        function closeBookModal() { document.getElementById('bookModal').classList.remove('active'); }
        
        window.editBook = async (id) => {
            try {
                const book = await apiRequest(`/books/${id}`);
                document.getElementById('modalTitle').textContent = 'Редактировать';
                document.getElementById('bookIdField').value = book.id;
                const form = document.getElementById('bookForm');
                for (let key in book) if (form.elements[key]) form.elements[key].value = book[key];
                document.getElementById('bookModal').classList.add('active');
            } catch (e) { showNotification(e.message, 'error'); }
        };

        document.getElementById('bookForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            const id = data.id; delete data.id;
            try {
                if (id) await apiRequest(`/books/${id}`, { method: 'PUT', body: data });
                else await apiRequest('/books', { method: 'POST', body: data });
                showNotification('Успешно', 'success');
                closeBookModal();
                loadAdminTab('books');
            } catch (e) { showNotification(e.message, 'error'); }
        };
    </script>
</body>
</html>
