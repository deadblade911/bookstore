<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация — КнигоМир</title>
    <link rel="stylesheet" href="/style.css?v=10">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-top">
            <a href="/" class="logo">
                <span class="logo-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                </span>
                <span>КнигоМир</span>
            </a>
            
            <div class="header-actions">
                <button class="header-action-btn" id="themeToggle" title="Сменить тему">
                    <svg class="theme-icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg class="theme-icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
                <div id="userHeaderActions" style="display: flex; gap: 0.5rem;"></div>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: calc(var(--header-height) + 4rem); margin-bottom: 6rem; display: flex; justify-content: center;">
        <div class="auth-card" style="background: var(--bg-card); padding: 3rem; border-radius: var(--radius-lg); border: 1px solid var(--border); width: 100%; max-width: 450px; box-shadow: var(--shadow-lg);">
            
            <div id="loginSection">
                <h1 style="text-align: center; margin-bottom: 2rem;">Вход</h1>
                <form id="loginForm">
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem;">Email</label>
                        <input type="email" name="email" style="width: 100%; padding: 0.8rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main);" required>
                    </div>
                    <div style="margin-bottom: 2rem;">
                        <label style="display: block; margin-bottom: 0.5rem;">Пароль</label>
                        <input type="password" name="password" style="width: 100%; padding: 0.8rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main);" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Войти</button>
                </form>
                <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
                    Нет аккаунта? <a href="#" onclick="showAuthMode('register')" style="color: var(--primary); font-weight: 600;">Зарегистрироваться</a>
                </p>
            </div>

            <div id="registerSection" style="display: none;">
                <h1 style="text-align: center; margin-bottom: 2rem;">Регистрация</h1>
                <form id="registerForm">
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem;">Имя</label>
                        <input type="text" name="name" style="width: 100%; padding: 0.8rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main);" required>
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem;">Email</label>
                        <input type="email" name="email" style="width: 100%; padding: 0.8rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main);" required>
                    </div>
                    <div style="margin-bottom: 2rem;">
                        <label style="display: block; margin-bottom: 0.5rem;">Пароль</label>
                        <input type="password" name="password" style="width: 100%; padding: 0.8rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main);" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Создать аккаунт</button>
                </form>
                <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
                    Уже есть аккаунт? <a href="#" onclick="showAuthMode('login')" style="color: var(--primary); font-weight: 600;">Войти</a>
                </p>
            </div>

        </div>
    </main>

    <script>
        function showAuthMode(mode) {
            document.getElementById('loginSection').style.display = mode === 'login' ? 'block' : 'none';
            document.getElementById('registerSection').style.display = mode === 'register' ? 'block' : 'none';
            document.title = (mode === 'login' ? 'Вход' : 'Регистрация') + ' — КнигоМир';
        }

        // Check URL for mode
        window.addEventListener('load', () => {
            const path = window.location.pathname;
            if (path === '/register') showAuthMode('register');
            else showAuthMode('login');
        });
    </script>

    <div class="notifications" id="notifications"></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/app.js?v=3"></script>
</body>
</html>
